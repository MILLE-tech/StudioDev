<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire d'inscription</title>
    <link rel="stylesheet" href="f.css">
</head>
<body>
    <h1>Inscrivez-vous à notre événement</h1>
    <form action="#" method="post">
        <table border="0">
            <tr>
                <td><label for="nom">Nom:</label></td>
                <td><input type="text" id="nom" name="nom" placeholder="Votre nom" maxlength="50" required></td>
            </tr>
            <tr>
                <td><label for="prenom">Prénom:</label></td>
                <td><input type="text" id="prenom" name="prenom" placeholder="Votre prénom" maxlength="50" required></td>
            </tr>
            <tr>
                <td><label for="email">Email:</label></td>
                <td><input type="email" id="email" name="email" placeholder="Votre email" maxlength="100" required></td>
            </tr>
            <tr>
                <td><label for="departement">Numéro département:</label></td>
                <td><input type="number" id="departement" name="departement" placeholder="Numéro département" required></td>
            </tr>
            <tr>
                <td colspan="2" style="text-align: center;">
                    <button type="submit">Valider</button>
                </td>
            </tr>
        </table>
    </form>
    <p><a class="home-button" href="index.html">Retour à l'accueil</a></p>
</body>
</html>
