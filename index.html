        /* Carrousel d'images modifié */
        .carousel {
            width: 60%; /* Réduction de la taille du carrousel */

            overflow: hidden;
            position: relative;
            margin: 50px auto;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
        }

        .carousel-inner {
            display: flex;
            transition: transform 1s ease-in-out; /* Transition plus fluide */

        }

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const carousel = document.querySelector('.carousel');
            const images = document.querySelectorAll('.carousel img');
            let currentIndex = 0;
        
            // Fonction pour ajuster la hauteur du conteneur
            function adjustContainerHeight() {
                const activeImage = images[currentIndex];
                carousel.style.height = `${activeImage.offsetHeight}px`;
            }
        
            // Fonction pour changer d'image
            function changeImage() {
                images[currentIndex].classList.remove('active');
                currentIndex = (currentIndex + 1) % images.length;
                images[currentIndex].classList.add('active');
                adjustContainerHeight(); // Ajuster la hauteur après avoir changé d'image
            }
        
            // Initialisation: ajuster la hauteur du conteneur dès le départ
            adjustContainerHeight();
        
            // Changer d'image toutes les 3 secondes
            setInterval(changeImage, 3000);
        
            // Ré-ajuster la hauteur si la fenêtre est redimensionnée
            window.addEventListener('resize', adjustContainerHeight);
        });
    </script>
